project:
  title: "Tiny Anomaly Detection Engine"
  author: "Susan"
  discord: ""
  description: "Moving average anomaly detector: raises ALERT when sensor input deviates from 4-sample mean by more than a programmable threshold."
  language: "Verilog"
  clock_hz: 10000000
  tiles: "1x1"
  top_module: "tt_um_anomaly_detector"
  source_files:
    - "project.v"

pinout:
  ui[0]: "sensor_data[0]"
  ui[1]: "sensor_data[1]"
  ui[2]: "sensor_data[2]"
  ui[3]: "sensor_data[3]"
  ui[4]: "sensor_data[4]"
  ui[5]: "sensor_data[5]"
  ui[6]: "sensor_data[6]"
  ui[7]: "sensor_data[7]"
  uo[0]: "ALERT"
  uo[1]: "READY"
  uo[2]: "mean[2]"
  uo[3]: "mean[3]"
  uo[4]: "mean[4]"
  uo[5]: "mean[5]"
  uo[6]: "mean[6]"
  uo[7]: "mean[7]"
  uio[0]: "threshold[0]"
  uio[1]: "threshold[1]"
  uio[2]: "threshold[2]"
  uio[3]: "threshold[3]"
  uio[4]: "threshold[4]"
  uio[5]: "threshold[5]"
  uio[6]: "threshold[6]"
  uio[7]: "threshold[7]"

yaml_version: 6
